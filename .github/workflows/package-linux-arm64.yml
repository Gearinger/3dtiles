name: Build and Push ARM64 Docker Image

on:
  push:
    branches: [ "master" ]  # 当 master 分支代码更新时触发
  workflow_dispatch:        # 支持在 GitHub 网页手动点击触发

env:
  REGISTRY: ghcr.io
  # 镜像名称会保存为 ghcr.io/你的用户名/3dtiles
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-arm64:
    # 使用 GitHub 官方提供的原生 ARM 架构物理服务器 (免费提供给公共开源仓库)
    # 避免使用 QEMU 模拟编译，使 C++ 的 vcpkg 编译速度提升 10 倍以上，防止超时
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # C++ 项目编译非常重要：必须拉取子模块
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 GitHub 容器托管服务 (GHCR)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取镜像的 tag 标签信息
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      # 在原生 ARM 服务器上编译 linux/arm64 镜像并推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 启用 Actions 缓存，第二次构建时如果代码无大变动，直接复用已编译的依赖包
          cache-from: type=gha
          cache-to: type=gha,mode=max
