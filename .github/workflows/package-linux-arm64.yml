name: Build and Push ARM64 Docker Image

on:
  push:
    branches: [ "master" ]  # 当代码推送到 master 主分支时触发
  workflow_dispatch:        # 支持在 GitHub Actions 页面手动点击按钮触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-arm64:
    # 核心：使用 GitHub 提供的原生 ARM64 物理服务器运行（对公共开源项目免费）
    # 这能避开 QEMU 模拟器翻译 C++ 编译指令所带来的性能损耗，大幅缩减 vcpkg 的编译时间，防止卡死超时
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 非常关键：C++ 依赖管理需要下载子模块 (vcpkg 等)
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GitHub Container Registry (GHCR)
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取镜像的标签与元数据
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      # 在原生 ARM 服务器上编译 linux/arm64 镜像并推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 启用 GitHub Actions 缓存优化，后续构建如依赖未变将直接复用，速度更快
          cache-from: type=gha
          cache-to: type=gha,mode=max
