name: Build Linux ARM64

on:
  workflow_dispatch:
    inputs:
      package:
        description: '打包并上传产物'
        required: true
        default: true
        type: boolean
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev libxxf86vm-dev \
            autoconf autoconf-archive automake libtool pkg-config

      - name: Setup vcpkg Environment (with Cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '84bab45d415d22042bd0b9081aea57f362da3f35'
          runVcpkgInstall: false
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

      - name: Run vcpkg install (using vcpkg.json manifest)
        run: |
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet=arm64-linux \
            --x-install-root=${{ github.workspace }}/vcpkg_installed \
            --allow-unsupported \
            --recurse \
            --clean-after-build
        # 注意：需要仓库根目录存在 vcpkg.json 列出所有依赖

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - name: Build
        run: cargo build --release
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/arm64-linux/lib/pkgconfig
          VCPKG_HAS_BEEN_INSTALLED: 1

      - name: Package
        if: github.event_name == 'workflow_dispatch' && inputs.package == true || github.event_name != 'workflow_dispatch'
        run: |
          mkdir -p release
          cp target/release/_3dtile release/ || true
          cp -r target/release/gdal release/ 2>/dev/null || true
          cp -r target/release/proj release/ 2>/dev/null || true
          cp -r target/release/osgPlugins-3.6.5 release/ 2>/dev/null || true
          tar -czf _3dtile-linux-arm64.tar.gz -C release .

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch' && inputs.package == true || github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: _3dtile-linux-arm64.tar.gz
