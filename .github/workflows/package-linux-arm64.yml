name: Build Linux ARM64

on:
  workflow_dispatch:          # 允许手动触发
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm   # GitHub 官方 ARM64 运行器
    steps:
      - uses: actions/checkout@v4 # 建议使用稳定 v4
        with:
          submodules: 'recursive'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxrandr-dev libxi-dev libxxf86vm-dev \
            autoconf autoconf-archive automake libtool pkg-config

      - name: Setup vcpkg Environment (with Cache)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '84bab45d415d22042bd0b9081aea57f362da3f35'
          runVcpkgInstall: false # 🌟 核心改变：只初始化环境，不让它代劳执行 install
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite" # 依旧保留高效的 GHA 缓存机制

      - name: Run vcpkg install with custom flags
        run: |
          # 显式调用已经由 Action 准备好的 vcpkg，并自由注入我们需要的参数
          ${{ github.workspace }}/vcpkg/vcpkg install \
            --triplet=arm64-linux \
            --x-install-root=${{ github.workspace }}/vcpkg_installed \
            --allow-unsupported \
            --recurse \
            --clean-after-build

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - name: Build
        run: cargo build --release
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg_installed/arm64-linux/lib/pkgconfig
          VCPKG_HAS_BEEN_INSTALLED: 1

      - name: Package
        run: |
          mkdir -p release
          # 确保目标文件存在，防止 cp 报错导致 workflow 中断
          cp target/release/_3dtile release/ || true
          [ -d target/release/gdal ] && cp -r target/release/gdal release/ || true
          [ -d target/release/proj ] && cp -r target/release/proj release/ || true
          [ -d target/release/osgPlugins-3.6.5 ] && cp -r target/release/osgPlugins-3.6.5 release/ || true
          
          # 打包
          tar -czf _3dtile-linux-arm64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4 # 保持与主流配套一致
        with:
          name: linux-arm64
          path: _3dtile-linux-arm64.tar.gz
